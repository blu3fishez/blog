baseURL: https://blog.blu3fishez.org/
languageCode: ko
title: blog.blu3fishez

module:
  imports:
    - path: github.com/imfing/hextra

summaryLength: 15  # 단어 수 기준 (기본값: 70)

menu:
  main:
    - name: Tags
      pageRef: /tags
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: RSS
      url: /blog/index.xml
      weight: 4
      params:
        icon: rss

outputs:
  section: [html, rss]

enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  theme:
    default: system
    displayToggle: true

  images:
    - /images/default-thumbnail.jpg

  blog:
    list:
      displayTags: true

  displayUpdatedDate: true
  dateFormat: "2006년 1월 2일"